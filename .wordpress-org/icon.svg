<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="geometricPrecision">
  <title>NoticePulse Icon</title>

  <defs>
    
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc"></stop>
      <stop offset="100%" stop-color="#22d3a5"></stop>
    </linearGradient>

    
    <radialGradient id="bgGlow" cx="20%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.35"></stop>
      <stop offset="60%" stop-color="#7c5cfc" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="barAmbient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.30"></stop>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"></stop>
    </radialGradient>

    
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff"></circle>
    </pattern>

    
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
      <feMerge>
        <feMergeNode></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="256" height="256" fill="#0d0d1a"></rect>
  
  <rect width="256" height="256" fill="url(#bgGlow)"></rect>
  
  <rect width="256" height="256" fill="url(#dots)" opacity="0.06"></rect>

  

  
  <rect x="12" y="67" width="232" height="122" rx="61" ry="61" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.13"></rect>
  
  <rect x="23" y="78" width="210" height="100" rx="50" ry="50" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.24"></rect>
  
  <rect x="34" y="89" width="188" height="78" rx="39" ry="39" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.35"></rect>
  
  <rect x="45" y="100" width="166" height="56" rx="28" ry="28" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.46"></rect>

  
  <ellipse cx="128" cy="128" rx="89" ry="37" fill="url(#barAmbient)"></ellipse>

  
  <g filter="url(#barGlow)">
    <rect x="56" y="111" width="144" height="34" rx="17" ry="17" fill="#7c5cfc"></rect>
  </g>

  
  <rect x="57.5" y="112.5" width="141" height="15" rx="15" fill="#ffffff" opacity="0.08"></rect>

  
  <circle cx="85" cy="128" r="4.4" fill="#ffffff"></circle>
  <rect x="103" y="125" width="60.5" height="4" rx="2" fill="#ffffff" opacity="0.55"></rect>
  <rect x="103" y="132" width="40.3" height="3.4" rx="1.7" fill="#ffffff" opacity="0.30"></rect>
</svg>